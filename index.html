<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>d0dg3!</title>
  <style> 
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
#game{display:block;background:#0b1220;width:100vw;height:100vh}
#ui{position:fixed;left:12px;top:12px;color:#e6eef8;z-index:10}
#ui h1{margin:0;font-size:20px}
#score{margin-top:6px;font-weight:600}
#level{margin-top:4px;font-size:14px;color:#d6e8ff}
#controls{margin-top:6px;font-size:12px;color:#c8d5e6}
#restart{margin-top:8px;padding:6px 10px;background:#ff6b6b;border:none;color:white;border-radius:6px}

canvas{width:100%;height:100%}
  </style>
</head>
<body>
  <div id="ui">
    <h1>d0dg3!</h1>
    <div id="score">Score: 0</div>
    <div id="level">Level: 1</div>
    <div id="controls">Move: ← → or A D • Tap left/right on mobile</div>
    <button id="restart" hidden>Restart</button>
  </div>
  <canvas id="game"></canvas>
  <script> const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restart');

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let audioStarted = false;

// background music setup (kept soft/muted during level splash)
const music = new Audio('D0DG3 soudtrack.mp3');
music.loop = true;
music.crossOrigin = 'anonymous';

// create nodes for gentle muffling + reverb
const musicSource = audioCtx.createMediaElementSource(music);
const musicGain = audioCtx.createGain();
const musicFilter = audioCtx.createBiquadFilter();
const convolver = audioCtx.createConvolver();
const convolverGain = audioCtx.createGain();

musicFilter.type = 'lowpass';
musicFilter.frequency.value = 12000; // open by default
musicFilter.Q.value = 0.7;
musicGain.gain.value = 0.9; // a bit louder by default
convolverGain.gain.value = 0.16; // wet level for reverb

// route: music -> filter -> dry gain -> dest
//                     -> convolver -> convolverGain -> dry gain
musicSource.connect(musicFilter);
musicFilter.connect(musicGain);
musicFilter.connect(convolver);
convolver.connect(convolverGain);
convolverGain.connect(musicGain);
musicGain.connect(audioCtx.destination);

// generate a short impulse response for gentle reverb
function createReverbImpulse(duration = 1.1, decay = 2.0) {
  const sampleRate = audioCtx.sampleRate;
  const length = sampleRate * duration;
  const impulse = audioCtx.createBuffer(2, length, sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const channelData = impulse.getChannelData(ch);
    for (let i = 0; i < length; i++) {
      channelData[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / length, decay);
    }
  }
  return impulse;
}
convolver.buffer = createReverbImpulse(1.2, 2.6);

function resumeAudioContext(){
  if(audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
}

function startAudio(){
  if(audioStarted) return;
  audioStarted = true;
  resumeAudioContext();
  // try to start playback; will usually be called from user interaction
  music.play().catch(() => {});
}

function setMusicMuffled(enabled){
  // enabled = true -> muffled (low cutoff + lower gain)
  const now = audioCtx.currentTime;
  if(enabled){
    musicFilter.frequency.exponentialRampToValueAtTime(600, now + 0.03);
    musicGain.gain.exponentialRampToValueAtTime(0.22, now + 0.03);
    convolverGain.gain.exponentialRampToValueAtTime(0.22, now + 0.03);
  } else {
    musicFilter.frequency.exponentialRampToValueAtTime(12000, now + 0.18);
    musicGain.gain.exponentialRampToValueAtTime(0.9, now + 0.18);
    convolverGain.gain.exponentialRampToValueAtTime(0.16, now + 0.18);
  }
}

function playSoftTone({freq = 420, duration = 0.18, volume = 0.14, type = 'triangle', attack = 0.012, release = 0.13} = {}) {
  startAudio();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();

  osc.type = type;
  osc.frequency.value = freq;
  filter.type = 'lowpass';
  filter.frequency.value = 1400;
  filter.Q.value = 0.85;

  gain.gain.setValueAtTime(0.0001, now);
  gain.gain.exponentialRampToValueAtTime(volume, now + attack);
  gain.gain.setTargetAtTime(0.0001, now + duration, release);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);

  osc.start(now);
  osc.stop(now + duration + 0.05);
}

function playSoftChord(freqs, duration = 0.34) {
  freqs.forEach(freq => playSoftTone({freq, duration, volume: 0.11, attack: 0.018, release: 0.12}));
}

function playLevelUpSound(){
  playSoftChord([320, 430, 520], 0.28);
}

let W = 800, H = 600;
let stars = [];
const starCount = 180;

function createStars(){
  stars = [];
  for(let i=0;i<starCount;i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 3 + 0.7,
      alpha: 0.5 + Math.random() * 0.5,
      speed: 20 + Math.random() * 45
    });
  }
}

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width; H = canvas.height;
  createStars();
}
window.addEventListener('resize', resize);
resize();

// Player
const player = {w:60,h:18,x:0,y:0,speed:520,dir:0};

// Enemy spacships
let enemies = [];
let upgrades = [];
let projectiles = [];
let running = true;
let lastTime = 0;
let spawnTimer = 0;
const baseSpawnInterval = 1200; // ms - increased for playability
let spawnInterval = baseSpawnInterval;
let score = 0;
let level = 1;
let pendingLevel = 1;
let paused = false;
let levelTransition = false;
let upgradeMessage = '';
let upgradeTimer = 0;
let elapsedTime = 0; // track time in level for upgrade spawning
const levelEl = document.getElementById('level');

// Active upgrades
let hasLaser = false;
let laserCooldown = 0;
let laserTimer = 0; // duration of laser in seconds
let hasShield = false;
let shieldHits = 0;

// Story state
let showIntro = true;
const storyIntro = 'You are the last pilot of the Aria, fleeing a dying starfield. Keep moving — avoid the fall of debris and reach the next waypoint.';
const storyLines = {
  1: 'Scouts report light debris; calibrate thrusters and keep steady.',
  2: 'Sensors pick up denser fragments. The currents grow restless.',
  3: 'A cluster of automated sentries patrols these lanes — move carefully.',
  4: 'The nebula deepens; visibility drops. Trust your instruments.',
  5: 'You approach the wreck of the Armada — salvage what you can, survive what you can.'
};

function applyUpgrades(levelValue){
  // Minor stat bump per level
  player.speed = 520 + (levelValue - 1) * 4;
}

function spawnUpgrade(){
  const types = ['laser', 'shield', 'speed'];
  const type = types[Math.floor(Math.random() * types.length)];
  const w = 16;
  upgrades.push({x: Math.random() * (W - w), y: -20, w, h: 16, type, speed: 60 + Math.random() * 40});
}

function activateUpgrade(type){
  if(type === 'laser'){ hasLaser = true; laserTimer = 15; upgradeMessage = 'Upgrade: LASER (15s)'; }
  else if(type === 'shield'){ hasShield = true; shieldHits = 2; upgradeMessage = 'Upgrade: SHIELD (2 hits)'; }
  else if(type === 'speed'){ player.speed = Math.min(player.speed + 80, 620); upgradeMessage = 'Upgrade: speed+'; }
  upgradeTimer = 2.0;
}

function reset(){
  enemies = [];
  upgrades = [];
  projectiles = [];
  running = true;
  lastTime = performance.now();
  spawnTimer = 0;
  spawnInterval = baseSpawnInterval;
  score = 0;
  level = 1;
  pendingLevel = 1;
  paused = false;
  levelTransition = false;
  upgradeMessage = '';
  upgradeTimer = 0;
  elapsedTime = 0;
  hasLaser = false;
  laserCooldown = 0;
  laserTimer = 0;
  hasShield = false;
  shieldHits = 0;
  levelEl.textContent = 'Level: ' + level;
  applyUpgrades(level);
  player.x = W/2 - player.w/2;
  player.y = H - player.h - 30;
  player.dir = 0;
  restartBtn.hidden = true;
  requestAnimationFrame(loop);
}

function spawn(){
  const w = 20 + Math.random() * 60;
  enemies.push({x: Math.random() * (W - w), y: -20, w, h: 16, speed: 140 + Math.random() * 240 + level * 28});
}

function rectsCollide(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function continueLevel(){
  if(!levelTransition) return;
  level = pendingLevel;
  levelEl.textContent = 'Level: ' + level;
  levelTransition = false;
  paused = false;
  applyUpgrades(level);
  try{ setMusicMuffled(false); }catch(e){}
  playLevelUpSound();
  spawnInterval = Math.max(200, baseSpawnInterval - (level - 1) * 96);
}

function update(dt){
  if(paused || showIntro) return;

  elapsedTime += dt;

  // player movement
  player.x += player.dir * player.speed * dt;
  if(player.x < 0) player.x = 0;
  if(player.x + player.w > W) player.x = W - player.w;

  // laser fire
  if(hasLaser && laserTimer > 0){
    laserCooldown -= dt;
    if(laserCooldown <= 0){
      projectiles.push({x: player.x + player.w/2 - 4, y: player.y, w: 8, h: 12, speed: 500});
      laserCooldown = 0.18; // fire rate
    }
  }

  // decay laser timer
  if(laserTimer > 0){
    laserTimer -= dt;
    if(laserTimer <= 0) hasLaser = false;
  }

  // move projectiles and check hits
  for(let i = projectiles.length - 1; i >= 0; i--){
    const p = projectiles[i];
    p.y -= p.speed * dt;
    if(p.y < 0){ projectiles.splice(i, 1); continue; }
    for(let j = enemies.length - 1; j >= 0; j--){
      const e = enemies[j];
      if(rectsCollide(p, e)){
        projectiles.splice(i, 1);
        enemies.splice(j, 1);
        score += 25; // bonus for laser kills
        break;
      }
    }
  }

  // spawn enemies
  spawnTimer += dt * 1000;
  if(spawnTimer > spawnInterval){
    spawnTimer = 0;
    spawn();
    spawnInterval = Math.max(350, spawnInterval * 0.992);
  }

  // spawn upgrades randomly (only in first 60 seconds)
  if(elapsedTime < 60 && Math.random() < 0.025 * dt) spawnUpgrade();

  // move upgrades
  for(let i = upgrades.length - 1; i >= 0; i--){
    const u = upgrades[i];
    u.y += u.speed * dt;
    if(u.y > H) upgrades.splice(i, 1);
    else if(rectsCollide(u, player)){
      activateUpgrade(u.type);
      upgrades.splice(i, 1);
    }
  }

  for(let i = enemies.length - 1; i >= 0; i--){
    const e = enemies[i];
    e.y += e.speed * dt;
    if(e.y > H) enemies.splice(i, 1);
    else if(rectsCollide(e, player)){
      if(hasShield){
        shieldHits--;
        enemies.splice(i, 1);
        if(shieldHits <= 0) hasShield = false;
      } else {
        running = false;
      }
    }
  }

  score += dt * 10;
  const pending = Math.max(1, Math.floor(score / 180) + 1);
  if(pending > level && !levelTransition){
    pendingLevel = pending;
    levelTransition = true;
    paused = true;
    try{ setMusicMuffled(true); }catch(e){}
  }

  if(upgradeTimer > 0) upgradeTimer = Math.max(0, upgradeTimer - dt);
}

const palettes = [
  {bg:['#010114','#08112b','#060d1a'], nebula:'rgba(95,155,255,0.45)', planet:'#3b5298', glow:'rgba(255,200,120,0.35)'},
  {bg:['#150217','#32154b','#19061e'], nebula:'rgba(236,131,255,0.4)', planet:'#7b3f9a', glow:'rgba(255,160,240,0.3)'},
  {bg:['#08110a','#112b14','#08210c'], nebula:'rgba(127,255,182,0.38)', planet:'#2a7a58', glow:'rgba(176,255,210,0.24)'},
  {bg:['#190810','#33153e','#170919'], nebula:'rgba(255,162,182,0.36)', planet:'#a84f81', glow:'rgba(255,180,210,0.2)'}
];

function getPalette(levelValue){
  return palettes[(levelValue - 1) % palettes.length];
}

function draw(){
  const palette = getPalette(level);
  ctx.clearRect(0,0,W,H);
  // space background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, palette.bg[0]);
  bg.addColorStop(0.4, palette.bg[1]);
  bg.addColorStop(1, palette.bg[2]);
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // bright thingy
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const nebula = ctx.createRadialGradient(W * 0.8, H * 0.15, 0, W * 0.8, H * 0.15, W * 0.28);
  nebula.addColorStop(0, palette.nebula);
  nebula.addColorStop(0.5, palette.nebula.replace(/0\.\d+/, '0.12'));
  nebula.addColorStop(1, 'rgba(8, 18, 42, 0)');
  ctx.fillStyle = nebula;
  ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(star => {
    star.y += star.speed * 0.04;
    if(star.y > H) star.y = 0;
    const flicker = star.alpha * (0.8 + 0.25 * Math.sin(performance.now() / 120 + star.x));
    ctx.fillStyle = `rgba(255,255,255,${flicker})`;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  });

  // big sparkle
  for(let i=0;i<6;i++){
    const x = (i + 0.5) / 6 * W;
    const y = H * 0.1 + (i % 2) * H * 0.08;
    const radius = 2 + (i % 3);
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
  }

  ctx.restore();

  // planet glow
  const planetGlow = ctx.createRadialGradient(W * 0.25, H * 0.2, 0, W * 0.25, H * 0.2, W * 0.16);
  planetGlow.addColorStop(0, palette.glow);
  planetGlow.addColorStop(0.6, palette.glow.replace(/0\.\d+/, '0.08'));
  planetGlow.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = planetGlow;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = palette.planet;
  ctx.beginPath();
  ctx.arc(W * 0.25, H * 0.2, W * 0.09, 0, Math.PI * 2);
  ctx.fill();

  //  player trail
  if(player.dir !== 0){
    ctx.fillStyle = 'rgba(78, 225, 167, 0.12)';
    for(let i=1;i<=2;i++){
      const trailX = player.x - player.dir * i * 12;
      ctx.fillRect(trailX, player.y, 6, player.h);
    }
  }

  // player ship (8-bit pixel art)
  ctx.fillStyle = '#4ee1a7';
  const px = player.x;
  const py = player.y;
  const pw = player.w;
  const ph = player.h;
  // body
  ctx.fillRect(px + pw*0.25, py + ph*0.25, pw*0.5, ph*0.5);
  // top point
  ctx.fillRect(px + pw*0.4, py, pw*0.2, ph*0.25);
  // bottom fins
  ctx.fillRect(px + pw*0.15, py + ph*0.75, pw*0.7, ph*0.25);
  // sides (windows)
  ctx.fillStyle = '#b8fff2';
  ctx.fillRect(px + pw*0.2, py + ph*0.35, 4, 4);
  ctx.fillRect(px + pw*0.8 - 4, py + ph*0.35, 4, 4);

  // enemies (pixel blocks)
  enemies.forEach(e => {
    ctx.fillStyle = '#ff5555';
    ctx.fillRect(e.x, e.y, e.w, e.h);
    // eyes
    ctx.fillStyle = '#000000';
    ctx.fillRect(e.x + 2, e.y + 2, 3, 3);
    ctx.fillRect(e.x + e.w - 5, e.y + 2, 3, 3);
  });

  // projectiles (laser bolts - 8-bit style)
  projectiles.forEach(p => {
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(p.x, p.y, p.w, p.h);
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(p.x + 1, p.y + 1, p.w - 2, p.h - 2);
  });

  // upgrades (8-bit pixel tiles)
  upgrades.forEach(u => {
    const colors = { laser: '#ffff00', shield: '#00ffff', speed: '#ff00ff' };
    const col = colors[u.type] || '#ffffff';
    // tile background
    ctx.fillStyle = col;
    ctx.fillRect(u.x, u.y, u.w, u.h);
    // border
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.strokeRect(u.x, u.y, u.w, u.h);
    // label
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(u.type[0].toUpperCase(), u.x + u.w/2, u.y + u.h/2 + 4);
  });

  // shield indicator (8-bit pixel style)
  if(hasShield){
    ctx.strokeStyle = '#00ffff';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.6 + 0.3 * Math.sin(performance.now() / 150);
    ctx.strokeRect(player.x - 6, player.y - 6, player.w + 12, player.h + 12);
    ctx.globalAlpha = 1.0;
  }

  // ground line
  ctx.fillStyle = 'rgba(255,255,255,0.03)';
  ctx.fillRect(0, H-10, W, 10);

  // active upgrades display (8-bit style)
  let statusY = H - 60;
  ctx.fillStyle = '#4ee1a7';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'left';
  if(hasLaser) ctx.fillText('[L] LASER', 12, statusY);
  if(hasShield) ctx.fillText('[S] SHIELD', 12, statusY + 20);
  if(hasLaser || hasShield) ctx.textAlign = 'center';

  if(upgradeMessage && upgradeTimer > 0){
    ctx.save();
    ctx.globalAlpha = 1.0;
    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(W * 0.15, H * 0.06, W * 0.7, 52);
    ctx.strokeStyle = '#4ee1a7';
    ctx.lineWidth = 2;
    ctx.strokeRect(W * 0.15, H * 0.06, W * 0.7, 52);
    ctx.restore();
    ctx.fillStyle = '#4ee1a7';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(upgradeMessage, W / 2, H * 0.11 + 18);
  }

  if(levelTransition){
    ctx.fillStyle = 'rgba(0,0,0,0.78)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#4ee1a7';
    ctx.font = 'bold 36px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('LEVEL ' + pendingLevel, W / 2, H / 2 - 20);
    ctx.font = '14px monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('[ press any key to continue ]', W / 2, H / 2 + 8);
    // show a little story snippet for this upcoming level
    const snippet = storyLines[pendingLevel] || '';
    if(snippet){
      const wrap = snippet.match(/.{1,50}(?:\s|$)/g) || [snippet];
      ctx.font = '12px monospace';
      ctx.fillStyle = '#ffff00';
      for(let i=0;i<wrap.length;i++){
        ctx.fillText(wrap[i].trim(), W/2, H/2 + 38 + i*16);
      }
    }
  }

  // intro overlay
  if(showIntro){
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#4ee1a7';
    ctx.font = 'bold 48px monospace';
    ctx.textAlign = 'center';
    ctx.fillText('D0DG3', W/2, H*0.32);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#ffff00';
    const lines = storyIntro.match(/.{1,60}(?:\s|$)/g) || [storyIntro];
    for(let i=0;i<lines.length;i++) ctx.fillText(lines[i].trim(), W/2, H*0.42 + i*18);
    ctx.font = '12px monospace';
    ctx.fillStyle = '#ffffff';
    ctx.fillText('[ press any key to start ]', W/2, H*0.62);
  }
}

function loop(ts){
  const dt = (ts - lastTime)/1000;
  lastTime = ts;
  if(running){ update(dt); draw(); scoreEl.textContent = 'Score: ' + Math.floor(score);
    requestAnimationFrame(loop);
  } else {
    // game over
    draw();
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff5555'; ctx.font = 'bold 32px monospace'; ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H/2 - 20);
    ctx.fillStyle = '#ffff00'; ctx.font = '16px monospace';
    ctx.fillText('Score: ' + Math.floor(score), W/2, H/2 + 10);
    restartBtn.hidden = false;
  }
}

// controls
window.addEventListener('keydown', e => {
  if(showIntro){ if(!audioStarted) startAudio(); showIntro = false; return; }
  if(!audioStarted) startAudio();
  if(levelTransition){ continueLevel(); return; }
  if(e.key==='ArrowLeft' || e.key==='a') player.dir = -1;
  if(e.key==='ArrowRight' || e.key==='d') player.dir = 1;
});
window.addEventListener('keyup', e => { if(['ArrowLeft','ArrowRight','a','d'].includes(e.key)) player.dir = 0; });

// touch controls
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if(showIntro){ if(!audioStarted) startAudio(); showIntro = false; return; }
  if(!audioStarted) startAudio();
  if(levelTransition){ continueLevel(); return; }
  const x = e.touches[0].clientX;
  player.dir = x < W/2 ? -1 : 1;
});
canvas.addEventListener('touchend', () => { player.dir = 0; });

canvas.addEventListener('pointerdown', () => {
  if(showIntro){ if(!audioStarted) startAudio(); showIntro = false; return; }
  if(levelTransition) continueLevel();
});

restartBtn.addEventListener('click', () => { reset(); });

// initialize positions and start
player.x = W/2 - player.w/2; player.y = H - player.h - 30;
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
