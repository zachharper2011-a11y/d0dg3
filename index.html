<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>d0dg3!</title>
  <style> 
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial}
#game{display:block;background:#0b1220;width:100vw;height:100vh}
#ui{position:fixed;left:12px;top:12px;color:#e6eef8;z-index:10}
#ui h1{margin:0;font-size:20px}
#score{margin-top:6px;font-weight:600}
#controls{margin-top:6px;font-size:12px;color:#c8d5e6}
#restart{margin-top:8px;padding:6px 10px;background:#ff6b6b;border:none;color:white;border-radius:6px}

canvas{width:100%;height:100%}
  </style>
</head>
<body>
  <div id="ui">
    <h1>d0dg3!</h1>
    <div id="score">Score: 0</div>
    <div id="controls">Move: ← → or A D • Tap left/right on mobile</div>
    <button id="restart" hidden>Restart</button>
  </div>
  <canvas id="game"></canvas>
  <script> const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restart');

const music = new Audio('D0DG3 soudtrack.mp3');
music.loop = true;
music.volume = 0.5;
let musicStarted = false;
function playMusic(){
  if (musicStarted) return;
  musicStarted = true;
  music.currentTime = 0;
  music.play().catch(() => {
    
  });
}

let W = 800, H = 600;
let stars = [];
const starCount = 180;

function createStars(){
  stars = [];
  for(let i=0;i<starCount;i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 3 + 0.7,
      alpha: 0.5 + Math.random() * 0.5,
      speed: 20 + Math.random() * 45
    });
  }
}

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  W = canvas.width; H = canvas.height;
  createStars();
}
window.addEventListener('resize', resize);
resize();

// Player
const player = {w:60,h:18,x:0,y:0,speed:520,dir:0};

// Enemy spacships
let enemies = [];
let running = true;
let lastTime = 0;
let spawnTimer = 0;
let spawnInterval = 900; // ms
let score = 0;

function reset(){
  playMusic();
  enemies = [];
  running = true;
  lastTime = performance.now();
  spawnTimer = 0;
  spawnInterval = 900;
  score = 0;
  player.x = W/2 - player.w/2;
  player.y = H - player.h - 30;
  restartBtn.hidden = true;
  requestAnimationFrame(loop);
}

function spawn(){
  const w = 20 + Math.random()*60;
  enemies.push({x:Math.random()*(W-w), y:-20, w, h:16, speed:120 + Math.random()*220});
}

function rectsCollide(a,b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}

function update(dt){
  // player movement
  player.x += player.dir * player.speed * dt;
  if(player.x < 0) player.x = 0;
  if(player.x + player.w > W) player.x = W - player.w;

  // spawn enemies
  spawnTimer += dt*1000;
  if(spawnTimer > spawnInterval){ spawnTimer = 0; spawn(); spawnInterval = Math.max(300, spawnInterval*0.995); }

  for(let i=enemies.length-1;i>=0;i--){
    const e = enemies[i];
    e.y += e.speed * dt;
    if(e.y > H) enemies.splice(i,1);
    else if(rectsCollide(e, player)) { running = false; }
  }

  score += dt * 10;
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // space background
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, '#010114');
  bg.addColorStop(0.4, '#08112b');
  bg.addColorStop(1, '#060d1a');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // bright thingy
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const nebula = ctx.createRadialGradient(W * 0.8, H * 0.15, 0, W * 0.8, H * 0.15, W * 0.28);
  nebula.addColorStop(0, 'rgba(95, 155, 255, 0.45)');
  nebula.addColorStop(0.5, 'rgba(95, 155, 255, 0.15)');
  nebula.addColorStop(1, 'rgba(8, 18, 42, 0)');
  ctx.fillStyle = nebula;
  ctx.fillRect(0,0,W,H);

  // stars
  stars.forEach(star => {
    star.y += star.speed * 0.04;
    if(star.y > H) star.y = 0;
    const flicker = star.alpha * (0.8 + 0.25 * Math.sin(performance.now() / 120 + star.x));
    ctx.fillStyle = `rgba(255,255,255,${flicker})`;
    ctx.fillRect(star.x, star.y, star.size, star.size);
  });

  // big sparkle
  for(let i=0;i<6;i++){
    const x = (i + 0.5) / 6 * W;
    const y = H * 0.1 + (i % 2) * H * 0.08;
    const radius = 2 + (i % 3);
    ctx.beginPath();
    ctx.arc(x, y, radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fill();
  }

  ctx.restore();

  // planet glow
  const planet = ctx.createRadialGradient(W * 0.25, H * 0.2, 0, W * 0.25, H * 0.2, W * 0.16);
  planet.addColorStop(0, 'rgba(255, 200, 120, 0.35)');
  planet.addColorStop(0.6, 'rgba(255, 140, 90, 0.08)');
  planet.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = planet;
  ctx.fillRect(0,0,W,H);
  ctx.fillStyle = '#3b5298';
  ctx.beginPath();
  ctx.arc(W * 0.25, H * 0.2, W * 0.09, 0, Math.PI * 2);
  ctx.fill();

  //  player trail
  if(player.dir !== 0){
    ctx.fillStyle = 'rgba(78, 225, 167, 0.18)';
    for(let i=1;i<=4;i++){
      const trailX = player.x - player.dir * i * 10;
      const trailW = player.w + i * 4;
      ctx.fillRect(trailX, player.y, trailW, player.h);
    }
  }

  // player ship
  ctx.save();
  ctx.translate(player.x + player.w / 2, player.y + player.h / 2);
  ctx.fillStyle = '#4ee1a7';
  ctx.beginPath();
  ctx.moveTo(0, -player.h - 6);
  ctx.lineTo(player.w / 1.8, player.h + 4);
  ctx.lineTo(player.w / 4, player.h - 4);
  ctx.lineTo(-player.w / 4, player.h - 4);
  ctx.lineTo(-player.w / 1.8, player.h + 4);
  ctx.closePath();
  ctx.fill();

  ctx.strokeStyle = '#b8fff2';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.restore();

  // enemies
  ctx.fillStyle = '#ff6b6b';
  enemies.forEach(e => ctx.fillRect(e.x, e.y, e.w, e.h));

  // ground line
  ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fillRect(0, H-10, W, 10);
}

function loop(ts){
  const dt = (ts - lastTime)/1000;
  lastTime = ts;
  if(running){ update(dt); draw(); scoreEl.textContent = 'Score: ' + Math.floor(score);
    requestAnimationFrame(loop);
  } else {
    // game over
    draw();
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#fff'; ctx.font = '28px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('Game Over — Score: ' + Math.floor(score), W/2, H/2 - 10);
    restartBtn.hidden = false;
  }
}

// controls
window.addEventListener('keydown', e => {
  if (!musicStarted) playMusic();
  if(e.key==='ArrowLeft' || e.key==='a') player.dir = -1;
  if(e.key==='ArrowRight' || e.key==='d') player.dir = 1;
});
window.addEventListener('keyup', e => { if(['ArrowLeft','ArrowRight','a','d'].includes(e.key)) player.dir = 0; });

// touch controls 
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!musicStarted) playMusic();
  const x = e.touches[0].clientX;
  player.dir = x < W/2 ? -1 : 1;
});
canvas.addEventListener('touchend', e => { player.dir = 0; });

restartBtn.addEventListener('click', () => { reset(); });

// initialize positions and start
player.x = W/2 - player.w/2; player.y = H - player.h - 30;
lastTime = performance.now();
requestAnimationFrame(loop);
</script>
</body>
</html>
